name: Staging Smokes (Shadow)

on:
  workflow_dispatch:

env:
  SHADOW_MODE: true
  PUBLISH_TO_DISCORD: false
  NODE_VERSION: '18.x'

jobs:
  smokes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --include=dev --no-audit --no-fund
      - name: Env validate
        run: npm run env:validate || true
      - name: Run smokes
        run: npm run smoke:all || true
      - name: Run ops:all (shadow)
        run: npm run ops:all || true
      - name: Upload outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-smoke-${{ github.run_id }}
          path: out/**
      - name: Comment dashboard on PR
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx tsx scripts/ci/comment-ops-summary.ts

