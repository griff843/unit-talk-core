name: Branch Protection & Deployment

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    types: [completed]
    branches: [main]

env:
  NODE_VERSION: '18.x'
  SHADOW_MODE: true
  PUBLISH_TO_DISCORD: false

jobs:
  # Pre-deployment validation
  deployment-readiness:
    name: Deployment Readiness Check
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event.workflow_run.conclusion == 'success'
    timeout-minutes: 10
    
    environment:
      name: production-gate
      
    outputs:
      deployment-approved: ${{ steps.readiness.outputs.approved }}
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Check deployment readiness
        id: readiness
        run: |
          echo "Checking deployment readiness criteria..."
          
          # Check if this is a fast-forward merge
          MERGE_BASE=$(git merge-base HEAD~1 HEAD)
          if [[ "$MERGE_BASE" != "$(git rev-parse HEAD~1)" ]]; then
            echo "✅ Clean merge detected"
          else
            echo "⚠️  Fast-forward merge - validating changes"
          fi
          
          # Check for breaking changes markers
          if git log --oneline -10 | grep -i "BREAKING\|breaking"; then
            echo "⚠️  Breaking changes detected - manual approval required"
            echo "approved=manual" >> $GITHUB_OUTPUT
          else
            echo "✅ No breaking changes detected"
            echo "approved=auto" >> $GITHUB_OUTPUT
          fi
          
          # Validate critical file changes
          CRITICAL_FILES=$(git diff --name-only HEAD~1 HEAD | grep -E "(package\.json|tsconfig\.json|\.github/workflows/|migrations/)" || true)
          if [[ -n "$CRITICAL_FILES" ]]; then
            echo "⚠️  Critical files modified:"
            echo "$CRITICAL_FILES"
            echo "Manual validation recommended"
          fi
          
      - name: Generate deployment summary
        run: |
          echo "## Deployment Readiness Report" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ steps.readiness.outputs.approved }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**CI Status:** ${{ github.event.workflow_run.conclusion }}" >> $GITHUB_STEP_SUMMARY

  # Production deployment (conditional)
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deployment-readiness
    if: needs.deployment-readiness.outputs.deployment-approved == 'auto'
    timeout-minutes: 15
    
    environment:
      name: production
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci --omit=dev --no-audit --no-fund
        
      - name: Build for production
        run: npm run build
        env:
          NODE_ENV: production
          NODE_OPTIONS: '--max-old-space-size=4096'
          
      - name: Run production health check
        env:
          SHADOW_MODE: false
          PUBLISH_TO_DISCORD: false
          NODE_ENV: production
        run: |
          echo "Running production health checks..."
          # Add actual health check commands here
          echo "✅ Production build validated"
          
      - name: Deploy notification
        run: |
          echo "## 🚀 Production Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** Production" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed at:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_STEP_SUMMARY

  # Pull Request Quality Gate
  pr-quality-gate:
    name: PR Quality Gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 10
    
    permissions:
      pull-requests: write
      contents: read
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Analyze PR changes
        id: pr-analysis
        run: |
          echo "Analyzing pull request changes..."
          
          # Get the base branch and current branch
          BASE_BRANCH="${{ github.event.pull_request.base.ref }}"
          HEAD_BRANCH="${{ github.event.pull_request.head.ref }}"
          
          # Count changes
          CHANGED_FILES=$(git diff --name-only origin/$BASE_BRANCH..HEAD | wc -l)
          ADDED_LINES=$(git diff --numstat origin/$BASE_BRANCH..HEAD | awk '{sum+=$1} END {print sum}')
          REMOVED_LINES=$(git diff --numstat origin/$BASE_BRANCH..HEAD | awk '{sum+=$2} END {print sum}')
          
          echo "changed_files=$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "added_lines=$ADDED_LINES" >> $GITHUB_OUTPUT
          echo "removed_lines=$REMOVED_LINES" >> $GITHUB_OUTPUT
          
          # Check for critical file changes
          CRITICAL_CHANGES=$(git diff --name-only origin/$BASE_BRANCH..HEAD | grep -E "(package\.json|\.github/workflows/|migrations/|\.env)" | wc -l)
          echo "critical_changes=$CRITICAL_CHANGES" >> $GITHUB_OUTPUT
          
          # Check for test file changes
          TEST_CHANGES=$(git diff --name-only origin/$BASE_BRANCH..HEAD | grep -E "(\\.test\\.|test/|tests/)" | wc -l)
          echo "test_changes=$TEST_CHANGES" >> $GITHUB_OUTPUT
          
      - name: Validate PR requirements
        run: |
          # Check PR title format
          PR_TITLE="${{ github.event.pull_request.title }}"
          if [[ "$PR_TITLE" =~ ^(feat|fix|docs|style|refactor|perf|test|chore|ci)(\(.+\))?\!?:\ .+ ]]; then
            echo "✅ PR title follows conventional commits format"
          else
            echo "⚠️  PR title should follow conventional commits format"
            echo "Format: type(scope): description"
            echo "Types: feat, fix, docs, style, refactor, perf, test, chore, ci"
          fi
          
          # Check if PR has description
          if [[ -n "${{ github.event.pull_request.body }}" ]]; then
            echo "✅ PR has description"
          else
            echo "⚠️  PR should have a description"
          fi
          
          # Check critical changes
          if [[ "${{ steps.pr-analysis.outputs.critical_changes }}" -gt 0 ]]; then
            echo "⚠️  Critical files modified - extra review recommended"
          fi
          
          # Check test coverage
          if [[ "${{ steps.pr-analysis.outputs.test_changes }}" -eq 0 && "${{ steps.pr-analysis.outputs.added_lines }}" -gt 50 ]]; then
            echo "⚠️  Large changes without test updates"
          fi
          
      - name: Comment PR analysis
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            // Check if bot comment already exists
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && comment.body.includes('## PR Quality Analysis')
            );
            
            const analysisComment = `## PR Quality Analysis 🔍
            
            **Changes Summary:**
            - Files changed: ${{ steps.pr-analysis.outputs.changed_files }}
            - Lines added: ${{ steps.pr-analysis.outputs.added_lines }}
            - Lines removed: ${{ steps.pr-analysis.outputs.removed_lines }}
            - Critical files: ${{ steps.pr-analysis.outputs.critical_changes }}
            - Test files: ${{ steps.pr-analysis.outputs.test_changes }}
            
            **Validation Status:**
            ${steps.pr-analysis.outputs.critical_changes > 0 ? '⚠️ Critical files modified' : '✅ No critical files modified'}
            ${steps.pr-analysis.outputs.test_changes > 0 || steps.pr-analysis.outputs.added_lines < 50 ? '✅ Test coverage looks good' : '⚠️ Consider adding tests for large changes'}
            
            **Next Steps:**
            - Ensure all CI checks pass
            - Review critical file changes carefully
            - Validate shadow mode compliance
            `;
            
            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: analysisComment
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: analysisComment
              });
            }

  # Auto-merge for dependabot PRs (optional)
  auto-merge-dependencies:
    name: Auto-merge Dependencies
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.actor == 'dependabot[bot]'
    needs: pr-quality-gate
    timeout-minutes: 5
    
    permissions:
      contents: write
      pull-requests: write
      
    steps:
      - name: Check if PR is ready for auto-merge
        id: auto-merge-check
        run: |
          # Only auto-merge minor/patch updates
          PR_TITLE="${{ github.event.pull_request.title }}"
          if [[ "$PR_TITLE" =~ "Bump.*from.*to" ]]; then
            echo "dependency_update=true" >> $GITHUB_OUTPUT
            
            # Extract version info (simplified check)
            if [[ "$PR_TITLE" =~ "from [0-9]+\\.[0-9]+\\.[0-9]+ to [0-9]+\\.[0-9]+\\.[0-9]+" ]]; then
              echo "version_type=patch" >> $GITHUB_OUTPUT
            else
              echo "version_type=unknown" >> $GITHUB_OUTPUT
            fi
          else
            echo "dependency_update=false" >> $GITHUB_OUTPUT
          fi
          
      - name: Auto-approve and merge
        if: steps.auto-merge-check.outputs.dependency_update == 'true' && steps.auto-merge-check.outputs.version_type == 'patch'
        uses: actions/github-script@v7
        with:
          script: |
            // Auto-approve the PR
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              event: 'APPROVE',
              body: '✅ Auto-approved dependency update'
            });
            
            // Enable auto-merge
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              commit_title: 'chore: ${{ github.event.pull_request.title }}',
              merge_method: 'squash'
            });
            
            console.log('✅ Dependency update auto-merged');