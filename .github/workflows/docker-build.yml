name: Docker Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build'
        required: false
        default: 'latest'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - name: api
            context: ./apps/api
            dockerfile: ./apps/api/Dockerfile
          - name: worker
            context: ./apps/worker
            dockerfile: ./apps/worker/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.service.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Check if Dockerfile exists
        id: dockerfile_check
        run: |
          if [ -f "${{ matrix.service.dockerfile }}" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠️ Dockerfile not found at ${{ matrix.service.dockerfile }}"
          fi

      - name: Create Dockerfile if missing
        if: steps.dockerfile_check.outputs.exists == 'false'
        run: |
          mkdir -p $(dirname ${{ matrix.service.dockerfile }})
          cat > ${{ matrix.service.dockerfile }} << 'EOF'
          # Multi-stage build for Node.js application
          FROM node:20-alpine AS builder
          
          WORKDIR /app
          
          # Copy workspace files
          COPY package*.json ./
          COPY tsconfig.json ./
          COPY apps/${{ matrix.service.name }}/package*.json ./apps/${{ matrix.service.name }}/
          COPY packages/ ./packages/
          
          # Install dependencies
          RUN npm ci
          
          # Copy source code
          COPY apps/${{ matrix.service.name }}/ ./apps/${{ matrix.service.name }}/
          
          # Build the application
          RUN npm run build -w apps/${{ matrix.service.name }}
          
          # Production stage
          FROM node:20-alpine
          
          WORKDIR /app
          
          # Install dumb-init for proper signal handling
          RUN apk add --no-cache dumb-init
          
          # Create non-root user
          RUN addgroup -g 1001 -S nodejs && \
              adduser -S nodejs -u 1001
          
          # Copy built application
          COPY --from=builder --chown=nodejs:nodejs /app/package*.json ./
          COPY --from=builder --chown=nodejs:nodejs /app/node_modules ./node_modules
          COPY --from=builder --chown=nodejs:nodejs /app/apps/${{ matrix.service.name }}/dist ./apps/${{ matrix.service.name }}/dist
          COPY --from=builder --chown=nodejs:nodejs /app/packages ./packages
          
          # Switch to non-root user
          USER nodejs
          
          # Health check
          HEALTHCHECK --interval=30s --timeout=3s --start-period=5s --retries=3 \
            CMD node -e "require('http').get('http://localhost:3000/healthz', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})" || exit 1
          
          # Use dumb-init to handle signals properly
          ENTRYPOINT ["dumb-init", "--"]
          
          # Start the application
          CMD ["npm", "run", "start", "-w", "apps/${{ matrix.service.name }}"]
          EOF

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SERVICE_NAME=${{ matrix.service.name }}
            BUILD_DATE=${{ steps.meta.outputs.created }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ steps.meta.outputs.version }}