name: Temporal Daily Reporting

on:
  schedule:
    - cron: '0 6 * * *' # daily at 06:00 UTC
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual run'
        required: false
        default: 'manual trigger'
        type: string

permissions:
  contents: read

jobs:
  daily-schedules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci --include=dev --no-audit --no-fund

      - name: Probe Temporal (soft)
        run: npm run ops:probe:temporal:soft
      - name: List schedules (non-blocking)
        run: npm run schedules:list || true
      - name: Emit dashboard
        run: node scripts/ops/emit-dashboard.js
      - name: Upload ops artifacts
        uses: actions/upload-artifact@v4
        with:
          name: temporal-daily-ops
          path: |
            out/ops/*.json
          if-no-files-found: warn
      - name: Summary
        shell: bash
        run: |
          echo "## Temporal Daily Report" >> $GITHUB_STEP_SUMMARY
          echo "Generated: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_STEP_SUMMARY
          FILE=out/ops/temporal-health.json
          if [ -f "$FILE" ]; then
            UP=$(node -e "console.log(require('./$FILE').up ? 'true' : 'false')")
            ADDR=$(node -e "console.log(require('./$FILE').address || '')")
            VER=$(node -e "console.log((require('./$FILE').serverVersion)||'unknown')")
            echo "- Up: $UP" >> $GITHUB_STEP_SUMMARY
            echo "- Address: $ADDR" >> $GITHUB_STEP_SUMMARY
            echo "- Version: $VER" >> $GITHUB_STEP_SUMMARY
          else
            echo "- No temporal-health.json produced" >> $GITHUB_STEP_SUMMARY
          fi

