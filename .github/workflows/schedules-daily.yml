name: Schedules Daily Check

on:
  schedule:
    - cron: '0 6 * * *' # daily at 06:00 UTC
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual run'
        required: false
        default: 'manual trigger'
        type: string

permissions:
  contents: write
  actions: write
  issues: write
  pull-requests: write

jobs:
  daily-schedules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci --include=dev --no-audit --no-fund

      - name: Temporal health
        run: node scripts/ops/temporal-health.ts || true

      - name: Run schedules:doctor
        id: doctor
        run: |
          set -e
          MODE=$(npm run -s schedules:doctor | grep MODE | sed 's/.*MODE=\(.*\)/\1/')
          echo "mode=$MODE" >> $GITHUB_OUTPUT

      - name: Notifier - PR or Issue
        uses: actions/github-script@v7
        with:
          script: |
            const mode = '${{ steps.doctor.outputs.mode }}' || 'cron';
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const today = new Date().toISOString().slice(0,10);

            // Repo variable helpers
            async function getVar(name) {
              try { const r = await github.rest.actions.getRepoVariable({ owner, repo, name }); return r.data.value; } catch { return null; }
            }
            async function setVar(name, value) {
              try { await github.rest.actions.updateRepoVariable({ owner, repo, name, value }); } catch { await github.rest.actions.createRepoVariable({ owner, repo, name, value }); }
            }

            const prev = (await getVar('SCHEDULES_LAST_MODE')) || 'cron';
            if (prev !== mode && prev === 'cron' && mode === 'schedules') {
              // Prefer commenting on open PRs targeting main
              const { data: prs } = await github.rest.pulls.list({ owner, repo, state: 'open', base: 'main' });
              if (prs && prs.length > 0) {
                const pr = prs[0];
                await github.rest.issues.createComment({ owner, repo, issue_number: pr.number, body: `MODE changed: cron → schedules (${today})` });
              } else {
                // Create or update a single tracking issue
                const title = 'Temporal Schedules Mode Changes';
                const { data: issues } = await github.rest.search.issuesAndPullRequests({ q: `repo:${owner}/${repo} is:issue in:title "${title}"` });
                let issueNumber = null;
                if (issues.items && issues.items.length > 0) {
                  issueNumber = issues.items[0].number;
                  await github.rest.issues.createComment({ owner, repo, issue_number: issueNumber, body: `MODE changed: cron → schedules (${today})` });
                } else {
                  const { data: created } = await github.rest.issues.create({ owner, repo, title, body: `Tracking Temporal Schedules MODE changes.\n\n- ${today}: cron → schedules` });
                  issueNumber = created.number;
                }
              }
            }
            await setVar('SCHEDULES_LAST_MODE', mode);

      - name: Generate ops dashboard
        run: node scripts/ops/emit-dashboard.js

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: schedules-daily
          path: |
            out/ops/dashboard.json
            out/dev/schedules-doctor.json
            out/ops/temporal-health.json
          if-no-files-found: warn

