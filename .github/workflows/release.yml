name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Release Please
        id: release
        uses: google-github-actions/release-please-action@v4
        with:
          release-type: node
          package-name: unit-talk-core
          changelog-types: |
            [
              {"type": "feat", "section": "Features", "hidden": false},
              {"type": "fix", "section": "Bug Fixes", "hidden": false},
              {"type": "perf", "section": "Performance Improvements", "hidden": false},
              {"type": "revert", "section": "Reverts", "hidden": false},
              {"type": "docs", "section": "Documentation", "hidden": false},
              {"type": "style", "section": "Styles", "hidden": false},
              {"type": "chore", "section": "Miscellaneous Chores", "hidden": false},
              {"type": "refactor", "section": "Code Refactoring", "hidden": false},
              {"type": "test", "section": "Tests", "hidden": false},
              {"type": "build", "section": "Build System", "hidden": false},
              {"type": "ci", "section": "Continuous Integration", "hidden": false}
            ]
          monorepo-tags: true
          command: manifest

  # Build and publish artifacts if release was created
  publish:
    name: Build and Publish
    needs: release
    if: ${{ needs.release.outputs.releases_created }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Type check
        run: npm run type-check

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-artifacts-${{ needs.release.outputs.version }}
          path: |
            apps/*/dist/
            packages/*/dist/
            out/
          retention-days: 30

  # Optional: Build and push Docker images
  docker:
    name: Docker Build and Push
    needs: release
    if: ${{ needs.release.outputs.releases_created }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [api, worker]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:latest
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ needs.release.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Create GitHub release summary
  release-summary:
    name: Release Summary
    needs: [release, publish]
    if: ${{ needs.release.outputs.releases_created }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Release Notes
        run: |
          echo "## Release ${{ needs.release.outputs.version }}" > release-notes.md
          echo "" >> release-notes.md
          echo "### 🚀 Deployment Information" >> release-notes.md
          echo "- **Version**: ${{ needs.release.outputs.version }}" >> release-notes.md
          echo "- **Tag**: ${{ needs.release.outputs.tag_name }}" >> release-notes.md
          echo "- **Date**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> release-notes.md
          echo "" >> release-notes.md
          echo "### 📦 Artifacts" >> release-notes.md
          echo "- Build artifacts available in workflow run" >> release-notes.md
          echo "- Docker images published to ghcr.io" >> release-notes.md
          echo "" >> release-notes.md
          echo "### 🔧 Configuration" >> release-notes.md
          echo "- Shadow Mode: Disabled for production" >> release-notes.md
          echo "- Discord Publishing: Enabled for production" >> release-notes.md

      - name: Update Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.release.outputs.tag_name }}
          body_path: release-notes.md
          append_body: true