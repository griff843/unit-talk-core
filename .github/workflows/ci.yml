name: CI / PR Hard

on:
  push:
    branches: ['**']
    paths-ignore:
      - 'legacy/**'
      - 'apps/command-center-legacy/**'
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - 'legacy/**'
      - 'apps/command-center-legacy/**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read
      actions: read
      id-token: write
    env:
      CI: true
      SHADOW_MODE: true
      PUBLISH_TO_DISCORD: false
      NODE_OPTIONS: --max_old_space_size=4096
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Start Temporal (docker)
        run: |
          docker compose up -d temporal-postgres temporal temporal-ui
          for i in {1..45}; do
            nc -z 127.0.0.1 7233 && echo "Temporal up" && break
            sleep 2
          done
          nc -z 127.0.0.1 7233 || (docker compose logs temporal && exit 1)

      - name: Resolve Temporal address
        run: npm run ops:resolve:temporal

      - name: Probe Temporal (hard)
        env:
          TEMPORAL_ADDRESS: 127.0.0.1:7233
        run: npm run ops:probe:temporal

      - name: Orchestrator / E2E (hard path)
        run: |
          npm run e2e:agents
          npm run agents:wave6:force
          npm run outbox:flush
          npm run dash:emit

      - name: Build Command Center (new only)
        run: npm --workspace @unit-talk/command-center run build

      - name: Summaries
        run: |
          echo "== Temporal health ==" && cat out/ops/temporal-health.json || true
          echo "== Dashboard ==" && cat out/ops/dashboard.json || true
          echo "== E2E summary ==" && cat out/ops/e2e-agents-summary.json || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-artifacts
          path: |
            out/**/*
            docs/**/*
          if-no-files-found: warn
