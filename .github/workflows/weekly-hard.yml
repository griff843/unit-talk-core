name: Weekly Hard

on:
  schedule:
    - cron: '0 9 * * 0' # Sundays 09:00 UTC
  workflow_dispatch: {}

concurrency:
  group: weekly-${{ github.ref }}
  cancel-in-progress: false

jobs:
  hard:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Start Temporal
        run: |
          docker compose up -d temporal-postgres temporal temporal-ui
          for i in {1..45}; do nc -z 127.0.0.1 7233 && break; sleep 2; done
          nc -z 127.0.0.1 7233 || (docker compose logs temporal && exit 1)

      - name: Resolve & Probe (hard)
        env:
          TEMPORAL_ADDRESS: 127.0.0.1:7233
        run: |
          npm run ops:resolve:temporal
          npm run ops:probe:temporal

      - name: Full agents + Wave-6 + Outbox
        run: |
          npm run e2e:agents
          npm run agents:wave6:force
          npm run outbox:flush
          npm run schedules:list
          npm run dash:emit

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-hard-artifacts
          path: out/**/*
          if-no-files-found: warn
